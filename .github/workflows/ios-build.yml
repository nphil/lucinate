name: Build iOS IPA (unsigned)

# Builds an UNSIGNED .ipa for sideloading (AltStore / Feather / Sideloadly),
# mirroring the Stashy pipeline: no Apple Developer account or signing secrets
# needed. The IPA is uploaded as a workflow artifact and attached to a release.

# Superseded by ios-native-release.yml (the native SwiftUI app is now the
# shipping iOS app, released as 2.0.x under the same bundle id). Kept for
# manual Flutter builds only — no longer auto-ships on push to main.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Compute version
        id: ver
        run: |
          set -euo pipefail
          # Base MAJOR.MINOR from pubspec; patch = run number so every build
          # produces a strictly-increasing semver that Feather treats as an
          # update. (Mirrors Stashy's auto-bump-every-build rule.)
          BASE=$(grep -m1 '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//; s/+.*//')
          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)
          VERSION="${MAJOR}.${MINOR}.${{ github.run_number }}"
          echo "version=$VERSION"          >> "$GITHUB_OUTPUT"
          echo "build=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "tag=ios-v$VERSION"          >> "$GITHUB_OUTPUT"
          echo "Building Lucinate v$VERSION (build ${{ github.run_number }})"

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (errors are fatal, warnings/infos are not)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Generate app icon from SVG
        run: |
          set -euo pipefail
          brew install librsvg
          ICONSET="ios/Runner/Assets.xcassets/AppIcon.appiconset"
          for pair in \
            "AppIcon-20@2x.png:40" "AppIcon-20@2x~ipad.png:40" "AppIcon-20@3x.png:60" "AppIcon-20~ipad.png:20" \
            "AppIcon-29.png:29" "AppIcon-29@2x.png:58" "AppIcon-29@2x~ipad.png:58" "AppIcon-29@3x.png:87" "AppIcon-29~ipad.png:29" \
            "AppIcon-40@2x.png:80" "AppIcon-40@2x~ipad.png:80" "AppIcon-40@3x.png:120" "AppIcon-40~ipad.png:40" \
            "AppIcon-60@2x~car.png:120" "AppIcon-60@3x~car.png:180" \
            "AppIcon-83.5@2x~ipad.png:167" \
            "AppIcon@2x.png:120" "AppIcon@2x~ipad.png:152" "AppIcon@3x.png:180" \
            "AppIcon~ios-marketing.png:1024" "AppIcon~ipad.png:76"; do
            f="${pair%%:*}"; s="${pair##*:}"
            rsvg-convert -w "$s" -h "$s" ios/AppIcon.svg -o "$ICONSET/$f"
          done
          echo "Generated app icons:"; ls "$ICONSET" | grep -c '\.png$'

      - name: Build unsigned iOS app
        run: |
          flutter build ios --release --no-codesign \
            --build-name=${{ steps.ver.outputs.version }} \
            --build-number=${{ steps.ver.outputs.build }}

      - name: Package into IPA
        run: |
          set -euo pipefail
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ Runner.app not found — build failed."
            find build/ios -maxdepth 3 2>/dev/null || true
            exit 1
          fi
          # Completeness gate: a real compile/link failure can leave a shell .app.
          EXE=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_PATH/Info.plist" 2>/dev/null || echo Runner)
          if [ ! -s "$APP_PATH/$EXE" ]; then
            echo "❌ App executable '$EXE' missing/empty — build failed."
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qr lucinate.ipa Payload
          echo "IPA size: $(du -sh lucinate.ipa | cut -f1)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: lucinate-ipa
          path: lucinate.ipa
          if-no-files-found: error

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Lucinate v${{ steps.ver.outputs.version }}
          body: |
            Unsigned IPA — sideload with AltStore / Feather / Sideloadly.
            Built from `${{ github.sha }}`.

            Feather source: https://raw.githubusercontent.com/nphil/lucinate/main/apps.json
          files: lucinate.ipa

      # Patch apps.json here rather than relying on a release-triggered
      # workflow: releases created by GITHUB_TOKEN do NOT fire the
      # `release: published` event, so the update must happen in this job.
      - name: Update Feather repo (apps.json)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          BUILD:   ${{ steps.ver.outputs.build }}
          TAG:     ${{ steps.ver.outputs.tag }}
          SHA:     ${{ github.sha }}
        run: |
          set -euo pipefail
          SIZE=$(wc -c < lucinate.ipa | tr -d ' ')
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          URL="https://github.com/nphil/lucinate/releases/download/${TAG}/lucinate.ipa"
          NOTES="Unsigned IPA — sideload with Feather/AltStore. Built from \`${SHA:0:7}\`."

          # The build was checked out at the triggering commit; move onto the
          # current tip of main before committing.
          git fetch origin main
          git checkout -B main origin/main

          VERSION="$VERSION" BUILD="$BUILD" DATE="$DATE" URL="$URL" SIZE="$SIZE" NOTES="$NOTES" \
          python3 - << 'PYEOF'
          import json, os
          data = json.load(open('apps.json'))
          app = data['apps'][0]
          entry = {
              "version": os.environ['VERSION'],
              "buildVersion": os.environ['BUILD'],
              "date": os.environ['DATE'],
              "localizedDescription": os.environ['NOTES'],
              "downloadURL": os.environ['URL'],
              "size": int(os.environ['SIZE']),
          }
          app['versions'] = [v for v in app['versions'] if v['version'] != entry['version']]
          app['versions'].insert(0, entry)
          with open('apps.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          print("apps.json patched for", entry['version'])
          PYEOF

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps.json
          git diff --cached --quiet && { echo "Nothing to commit"; exit 0; }
          git commit -m "Update Feather repo for ${TAG} [skip ci]"
          git push origin main
